const ANIM_DURATION = 7000; // 7 seconds full path travel
const TRAIL_LENGTH = 0.12;  // how much of path is lit as trail (0..1)

const PAUSE_AFTER = 800;

function usePathAnimation(playing) {
  const [progress, setProgress] = useState(0);
  const startRef = useRef(null);
  const rafRef = useRef(null);
  const pauseRef = useRef(null);

  useEffect(() => {
    if (!playing) { setProgress(0); return; }

    const startLoop = () => {
      startRef.current = null;
      const animate = (ts) => {
        if (!startRef.current) startRef.current = ts;
        const elapsed = ts - startRef.current;
        const p = Math.min(elapsed / ANIM_DURATION, 1);
        const eased = -(Math.cos(Math.PI * p) - 1) / 2;
        setProgress(eased);
        if (p < 1) {
          rafRef.current = requestAnimationFrame(animate);
        } else {
          pauseRef.current = setTimeout(() => {
            setProgress(0);
            setTimeout(startLoop, 150);
          }, PAUSE_AFTER);
        }
      };
      rafRef.current = requestAnimationFrame(animate);
    };

    startLoop();
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      if (pauseRef.current) clearTimeout(pauseRef.current);
    };
  }, [playing]);

  return progress;
}

function GoldPathSVG({ progress }) {
  const pathRef = useRef(null);
  const [pathLen, setPathLen] = useState(0);

  useEffect(() => {
    if (pathRef.current) {
      setPathLen(pathRef.current.getTotalLength());
    }
  }, []);

  if (pathLen === 0) return (
    <svg viewBox="0 0 100 66.7" preserveAspectRatio="none"
      style={{ position: "absolute", inset: 0, width: "100%", height: "100%", zIndex: 15, overflow: "visible" }}>
      <path ref={pathRef} d={FULL_PATH} fill="none" stroke="transparent" strokeWidth="0.1" />
    </svg>
  );

  const drawn = progress * pathLen;
  const trailStart = Math.max(0, drawn - TRAIL_LENGTH * pathLen);
  const trailLen = drawn - trailStart;

  // Dot position
  const dotPt = pathRef.current?.getPointAtLength(drawn);

  return (
    <svg viewBox="0 0 100 66.7" preserveAspectRatio="none"
      style={{ position: "absolute", inset: 0, width: "100%", height: "100%", zIndex: 15, overflow: "visible" }}>
      <defs>
        {/* Glow filter for the dot */}
        <filter id="dot-glow" x="-200%" y="-200%" width="500%" height="500%">
          <feGaussianBlur stdDeviation="1.2" result="blur1"/>
          <feGaussianBlur stdDeviation="0.4" result="blur2" in="SourceGraphic"/>
          <feMerge>
            <feMergeNode in="blur1"/>
            <feMergeNode in="blur2"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        {/* Subtle glow for trail */}
        <filter id="trail-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="0.5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        {/* Gradient for trail: bright at head, fades to nothing */}
        <linearGradient id="trailGrad" gradientUnits="userSpaceOnUse"
          x1={pathRef.current?.getPointAtLength(trailStart)?.x ?? 0}
          y1={pathRef.current?.getPointAtLength(trailStart)?.y ?? 0}
          x2={dotPt?.x ?? 0}
          y2={dotPt?.y ?? 0}>
          <stop offset="0%" stopColor={GOLD.dim} stopOpacity="0"/>
          <stop offset="60%" stopColor={GOLD.mid} stopOpacity="0.6"/>
          <stop offset="100%" stopColor={GOLD.bright} stopOpacity="1"/>
        </linearGradient>
      </defs>

      {/* Hidden path for measurement */}
      <path ref={pathRef} d={FULL_PATH} fill="none" stroke="transparent" strokeWidth="0.1"/>

      {/* Base path — very subtle, shows the full route faintly */}
      {progress > 0.02 && (
        <path
          d={FULL_PATH}
          fill="none"
          stroke={GOLD.dim}
          strokeWidth="0.18"
          strokeOpacity="0.2"
          strokeLinecap="round"
          strokeLinejoin="round"
          strokeDasharray={`${drawn} ${pathLen}`}
          strokeDashoffset="0"
        />
      )}

      {/* Trail — bright section behind dot */}
      {trailLen > 0 && (
        <path
          d={FULL_PATH}
          fill="none"
          stroke="url(#trailGrad)"
          strokeWidth="0.55"
          strokeLinecap="round"
          strokeLinejoin="round"
          strokeDasharray={`${trailLen} ${pathLen}`}
          strokeDashoffset={-trailStart}
          filter="url(#trail-glow)"
        />
      )}

      {/* The moving dot */}
      {dotPt && progress > 0.01 && progress < 0.995 && (
        <g filter="url(#dot-glow)">
          {/* Outer soft halo */}
          <circle
            cx={dotPt.x} cy={dotPt.y} r="1.4"
            fill={GOLD.glow}
            opacity="0.7"
          />
          {/* Core dot */}
          <circle
            cx={dotPt.x} cy={dotPt.y} r="0.55"
            fill={GOLD.bright}
            opacity="1"
          />
        </g>
      )}

      {/* Arrival burst at end */}
      {progress > 0.97 && (
        <g>
          {[0,1,2,3,4,5].map(i => {
            const angle = (i * 60 * Math.PI) / 180;
            const r = 3.5 * ((progress - 0.97) / 0.03);
            return (
              <circle key={i}
                cx={(dotPt?.x ?? 95) + r * Math.cos(angle)}
                cy={(dotPt?.y ?? 20) + r * Math.sin(angle)}
                r="0.25"
                fill={GOLD.bright}
                opacity={Math.max(0, 1 - (progress - 0.97) / 0.03 * 0.8)}
              />
            );
          })}
        </g>
      )}
    </svg>
  );
}

// ─── TTS Helper ───────────────────────────────────────────
const VOICE_PREFS = {
  'en-US': {
    female: ['Samantha','Karen','Moira','Victoria','Tessa','Google US English','Microsoft Zira','Alice'],
    male:   ['Daniel','Alex','Fred','Google UK English Male','Microsoft David','Thomas','Aaron'],
  },
  'de-DE': {
    female: ['Anna','Google Deutsch','Microsoft Hedda','Petra'],
    male:   ['Markus','Stefan','Hans','Google Deutsch Male','Microsoft Stefan'],
  },
  'ru-RU': {
    female: ['Milena','Katya','Irina','Google','Microsoft Irina'],
    male:   ['Yuri','Pavel','Dmitri','Google','Microsoft Pavel'],
  },
  'uk-UA': {
    female: ['Lesya','Google','Tetiana'],
    male:   ['Mykola','Google','Vasyl'],
  },
};

function speakText(text, lang, voiceGender) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();

  const langCode = lang === 'ru' ? 'ru-RU' : lang === 'uk' ? 'uk-UA' : lang === 'de' ? 'de-DE' : 'en-US';
  const gender = voiceGender === 'male' ? 'male' : 'female';

  // Clean markdown and emoji from text
  const clean = text
    .replace(/#{1,6}\s/g, '')
    .replace(/\*{1,2}([^*]+)\*{1,2}/g, '$1')
    .replace(/`[^`]+`/g, '')
    .replace(/\n{2,}/g, '. ')
    .replace(/\n/g, ' ')
    .substring(0, 800);

  const doSpeak = () => {
    const all = window.speechSynthesis.getVoices();
    if (!all.length) return;

    // Try preferred voices
    const prefs = (VOICE_PREFS[langCode] || VOICE_PREFS['en-US'])[gender];
    let picked = null;
    for (const name of prefs) {
      picked = all.find(v => v.name.includes(name));
      if (picked) break;
    }

    // Fallback: filter by language
    if (!picked) {
      const prefix = langCode.slice(0, 2);
      const byLang = all.filter(v => v.lang.startsWith(prefix));
      byLang.sort((a, b) => a.name.localeCompare(b.name));
      if (byLang.length >= 2) {
        picked = byLang[gender === 'female' ? 0 : 1];
      } else {
        picked = byLang[0] || all[0];
      }
    }

    // Natural voice settings
    const pitchMale = 0.85;
    const pitchFemale = 1.15;
    const rateMale = 0.88;
    const rateFemale = 0.92;

    const isAndroid = /Android/i.test(navigator.userAgent);

    // Android: chunk sentences to avoid silent bug
    if (isAndroid && clean.length > 150) {
      const sentences = clean.match(/[^.!?]+[.!?]+/g) || [clean];
      let i = 0;
      const next = () => {
        if (i >= sentences.length) return;
        const u = new SpeechSynthesisUtterance(sentences[i++].trim());
        u.lang = langCode;
        if (picked) u.voice = picked;
        u.pitch = gender === 'male' ? pitchMale : pitchFemale;
        u.rate = gender === 'male' ? rateMale : rateFemale;
        u.volume = 1.0;
        u.onend = next;
        window.speechSynthesis.speak(u);
      };
      next();
    } else {
      const u = new SpeechSynthesisUtterance(clean);
      u.lang = langCode;
      if (picked) u.voice = picked;
      u.pitch = gender === 'male' ? pitchMale : pitchFemale;
      u.rate = gender === 'male' ? rateMale : rateFemale;
      u.volume = 1.0;
      window.speechSynthesis.speak(u);
    }
  };

  setTimeout(() => {
    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
      doSpeak();
    } else {
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.onvoiceschanged = null;
        doSpeak();
      };
    }
  }, 150);
}

        .lang-btn.active { background: rgba(212,168,42,0.12); color: #F5C842; font-weight: 500; }
        .chat-area { flex: 1; padding: 22px 0; display: flex; flex-direction: column; gap: 15px; min-height: 400px; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; text-align: center; }
        .empty-state h2 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 300; font-style: italic; color: var(--text); }
        .suggestions { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 480px; }
        .suggestion-btn { background: var(--surface); border: 1px solid rgba(212,168,42,0.15); border-radius: 10px;
          padding: 11px 15px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
          cursor: pointer; text-align: left; transition: all 0.2s; }
        .suggestion-btn:hover { border-color: rgba(245,200,66,0.5); background: rgba(26,18,0,0.5); color: #F5C842; }
        .message { display: flex; flex-direction: column; animation: fadeUp 0.3s ease; }
        .message.user { align-items: flex-end; } .message.assistant { align-items: flex-start; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: var(--radius); line-height: 1.65; font-size: 15px; }
        .message.user .bubble { background: rgba(212,168,42,0.1); border: 1px solid rgba(212,168,42,0.25);
          border-bottom-right-radius: 4px; color: #f0dfa0; }
        .message.assistant .bubble { background: var(--ai-bg); border: 1px solid rgba(212,168,42,0.1);
          border-bottom-left-radius: 4px; color: var(--text); }
        .bubble p { margin-bottom: 8px; } .bubble p:last-child { margin-bottom: 0; }
        .bubble strong { color: #F5C842; font-weight: 500; }
        .typing-bubble { background: var(--ai-bg); border: 1px solid rgba(212,168,42,0.1);
          border-radius: var(--radius); border-bottom-left-radius: 4px; padding: 12px 16px;
          display: flex; align-items: center; gap: 10px; }
        .input-area { position: sticky; bottom: 0; background: var(--bg); padding: 12px 0 20px;
          border-top: 1px solid rgba(212,168,42,0.1); }
        .input-row { display: flex; gap: 10px; align-items: flex-end; }
        .input-wrapper { flex: 1; background: var(--surface); border: 1px solid rgba(212,168,42,0.15);
          border-radius: 14px; padding: 10px 14px; transition: border-color 0.2s; }
        .input-wrapper:focus-within { border-color: rgba(245,200,66,0.5); }
        textarea { width: 100%; background: none; border: none; outline: none; resize: none;
          color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.5;
          min-height: 24px; max-height: 120px; }
        textarea::placeholder { color: var(--muted); }
        .send-btn { width: 44px; height: 44px; background: #D4A82A; border: none; border-radius: 12px;
          cursor: pointer; display: flex; align-items: center; justify-content: center; color: #0d1117;
          transition: all 0.2s; flex-shrink: 0; }
        .send-btn:hover:not(:disabled) { background: #F5C842; transform: translateY(-1px); box-shadow: 0 0 20px rgba(245,200,66,0.3); }
        .send-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
        .disclaimer { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; font-style: italic; }
        @media(max-width:600px){.lang-btn{padding:5px 5px;font-size:11px;}.bubble{max-width:90%;font-size:14px;}}
      `}</style>

      {showSplash && !showDisclaimer && (
        <SplashScreen
          key="splash"
          lang={lang}
          showBtn={showSplashBtn}
          onDone={() => setShowDisclaimer(true)}
          onLangChange={(l) => setLang(l)}
        />
      )}
      {showSettings && (
        <SettingsPanel
          lang={lang}
          theme={theme}
          onThemeChange={setTheme}
          voice={voice}
          onVoiceChange={setVoice}
          academicMode={academicMode}
          onAcademicModeChange={setAcademicMode}
          inputMode={inputMode}
          onInputModeChange={setInputMode}
          onClose={() => setShowSettings(false)}
        />
      )}
      {showDisclaimer && (
        <DisclaimerModal
          lang={lang}
          onAccept={() => { setShowDisclaimer(false); setShowSplash(false); }}
        />
      )}

      {!showSplash && (
        <div className={`app ${appeared ? "visible" : ""}`}>
          <header className="header">
            <div className="logo">
              <div className="logo-icon"><EarIcon /></div>
              <div><h1>HearingAI</h1><p>{t.subtitle}</p></div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <div className="lang-switcher">
                {Object.entries(LANGUAGES).map(([code, l]) => (
                  <button key={code} className={`lang-btn ${lang===code?"active":""}`} onClick={() => switchLang(code)}>
                    {l.flag} {l.label}
                  </button>
                ))}
              </div>
              <button onClick={() => setShowSettings(true)} style={{
                background: "rgba(212,168,42,0.08)", border: "1px solid rgba(212,168,42,0.2)",
                borderRadius: "10px", width: "36px", height: "36px", cursor: "pointer",
                display: "flex", alignItems: "center", justifyContent: "center",
                color: "#D4A82A", transition: "all 0.2s", flexShrink: 0,
              }}
              onMouseEnter={e => e.currentTarget.style.background = "rgba(212,168,42,0.18)"}
              onMouseLeave={e => e.currentTarget.style.background = "rgba(212,168,42,0.08)"}>
                <GearIcon />
              </button>
            </div>
          </header>

          <div className="chat-area">
            {messages.length===0 && !loading ? (
              <div className="empty-state">
                <div style={{ width:60, height:60,
                  background:"linear-gradient(135deg,#1a1200,#2a1e00)",
                  border:"1px solid rgba(212,168,42,0.4)", borderRadius:16,
                  display:"flex", alignItems:"center", justifyContent:"center", color:"#F5C842" }}>
                  <EarIcon />
                </div>
                <h2>{t.subtitle}</h2>
                <div className="suggestions">
                  {t.suggestions.map((s, i) => (
                    <button key={i} className="suggestion-btn" onClick={() => sendMessage(s)}>{s}</button>
                  ))}
                </div>
              </div>
            ) : (
              <>
                {messages.map((msg, i) => (
                  <div key={i} className={`message ${msg.role}`}>
                    <div className="bubble">
                      {msg.content.split("\n").filter(Boolean).map((line, j) => (
                        <p key={j} dangerouslySetInnerHTML={{ __html: line.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>") }} />
                      ))}
                    </div>
                  </div>
                ))}
                {loading && (
                  <div className="message assistant">
                    <div className="typing-bubble">
                      <WaveAnim />
                      <span style={{ fontSize:13, color:"var(--muted)" }}>{t.thinking}</span>
                    </div>
                  </div>
                )}
              </>
            )}
            <div ref={bottomRef} />
          </div>

          <div className="input-area">
            <div className="input-row">
              {inputMode !== 'voice' && (
                <div className="input-wrapper">
                  <textarea ref={inputRef} value={input} onChange={e => setInput(e.target.value)}
                    onKeyDown={handleKey}
                    placeholder={isListening ? (t.listening || "Listening...") : t.placeholder}
                    rows={1}
                    onInput={e => { e.target.style.height="auto"; e.target.style.height=e.target.scrollHeight+"px"; }} />
                </div>
              )}
              {inputMode === 'voice' && (
                <div style={{
                  flex: 1, padding: "12px 16px", borderRadius: "14px",
                  background: isListening ? "rgba(212,168,42,0.08)" : "rgba(255,255,255,0.04)",
                  border: isListening ? "1px solid rgba(245,200,66,0.4)" : "1px solid rgba(212,168,42,0.12)",
                  color: isListening ? "#F5C842" : "var(--muted)",
                  fontFamily: "'DM Sans',sans-serif", fontSize: "14px",
                  display: "flex", alignItems: "center", gap: "8px", minHeight: "44px",
                }}>
                  {isListening ? `● ${t.listening || "Listening..."}` : (t.tapToSpeak || "Tap 🎙️ to speak")}
                </div>
              )}
              {(inputMode === 'both' || inputMode === 'voice') && (
                <button onClick={toggleListening} disabled={loading} style={{
                  width: "44px", height: "44px", borderRadius: "12px", border: "none",
                  cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "20px", flexShrink: 0, transition: "all 0.2s",
                  background: isListening ? "rgba(245,200,66,0.2)" : "rgba(212,168,42,0.1)",
                  boxShadow: isListening ? "0 0 16px rgba(245,200,66,0.5)" : "none",
                }}>
                  {isListening ? "⏹️" : "🎙️"}
                </button>
              )}
              {inputMode !== 'voice' && (
                <button className="send-btn" onClick={() => sendMessage()} disabled={!input.trim()||loading}>
                  <SendIcon />
                </button>
              )}
            </div>
            {academicMode && (
              <div style={{
                textAlign: "center", marginTop: "4px",
                fontSize: "10px", color: "#D4A82A", letterSpacing: "0.08em",
              }}>
                🎓 {t.academicModeOn || "ACADEMIC MODE"}
              </div>
            )}
            <p className="disclaimer">{t.disclaimer}</p>
          </div>
        </div>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
